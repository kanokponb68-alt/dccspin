<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SPORT DAY 2026 - Final Spin</title>

<style>
body{
    margin:0;
    font-family:'Arial Black',sans-serif;
    background:radial-gradient(circle,#1a1a2e,#000);
    color:white;
    text-align:center;
}

.title{
    font-size:6vw;
    margin-top:20px;
    text-shadow:0 0 20px white;
}

.slot-container{
    display:flex;
    justify-content:center;
    gap:3vw;
    margin:30px 0;
    flex-wrap:wrap;
}

.slot{
    font-size:10vw;
    width:18vw;
    min-width:80px;
    padding:20px;
    background:black;
    border-radius:20px;
    box-shadow:0 0 30px cyan inset,0 0 40px cyan;
    animation:blink 1s infinite;
}

@keyframes blink{
    50%{opacity:.7;}
}

button{
    font-size:5vw;
    padding:15px 30px;
    border:none;
    border-radius:50px;
    background:linear-gradient(45deg,#ff0080,#ffcc00);
    color:white;
    font-weight:bold;
    cursor:pointer;
    margin:10px;
}
button:active{ transform:scale(.95); }

.history{
    margin:20px auto;
    padding:15px;
    font-size:4vw;
    max-width:90%;
    max-height:220px;
    overflow-y:auto;
    background:rgba(255,255,255,0.1);
    border-radius:15px;
}
.history strong{
    display:block;
    margin-bottom:10px;
}
</style>
</head>

<body>

<h1 class="title">🏆 SPORT DAY 2026 🏆</h1>

<div class="slot-container">
    <div class="slot" id="slot1">A1</div>
    <div class="slot" id="slot2">A2</div>
    <div class="slot" id="slot3">A3</div>
    <div class="slot" id="slot4">A4</div>
</div>

<button onclick="randomAll()">🎤 สุ่ม 4 ทีม</button>

<div class="history" id="history">
    <strong>📜 ประวัติการสุ่ม</strong>
</div>

<script>
const teams=[
    {name:"A1",color:"gold",thai:"ทอง"},
    {name:"A2",color:"limegreen",thai:"เขียว"},
    {name:"A3",color:"hotpink",thai:"ชมพู"},
    {name:"A4",color:"orange",thai:"ส้ม"}
];

const slots=[
    document.getElementById("slot1"),
    document.getElementById("slot2"),
    document.getElementById("slot3"),
    document.getElementById("slot4")
];

const historyBox=document.getElementById("history");

let audioCtx;
let oscillator;

/* 🔊 เริ่มเสียงหมุน */
function startSpinSound(){
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    oscillator = audioCtx.createOscillator();
    oscillator.type = "sawtooth";
    oscillator.frequency.setValueAtTime(600, audioCtx.currentTime);
    oscillator.connect(audioCtx.destination);
    oscillator.start();
}

/* 💥 เสียง "ตึ๊ง!" ตอนจบ */
function dingSound(){
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();

    osc.type = "triangle";
    osc.frequency.setValueAtTime(1200, ctx.currentTime);

    gain.gain.setValueAtTime(1, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 1);

    osc.connect(gain);
    gain.connect(ctx.destination);

    osc.start();
    osc.stop(ctx.currentTime + 1);
}

function stopSpinSound(){
    if(oscillator){
        oscillator.stop();
        audioCtx.close();
    }
}

function shuffleArray(array){
    return array.sort(()=>Math.random()-0.5);
}

function randomAll(){
    let shuffled=[...teams];
    let startTime=Date.now();
    startSpinSound();

    const shuffle=setInterval(()=>{
        shuffled=shuffleArray([...teams]);

        slots.forEach((slot,i)=>{
            slot.textContent=shuffled[i].name;
            slot.style.color=shuffled[i].color;
            slot.style.boxShadow=`0 0 30px ${shuffled[i].color},0 0 50px ${shuffled[i].color}`;
        });

        let elapsed = Date.now() - startTime;

        /* ⏳ 3 วินาทีสุดท้ายให้เสียงช้าลง */
        if(elapsed > 2000 && oscillator){
            let progress = (elapsed - 2000) / 3000; // 0 → 1
            let newFreq = 600 - (progress * 500); // ลดความถี่ลง
            oscillator.frequency.setValueAtTime(newFreq, audioCtx.currentTime);
        }

        if(elapsed >= 5000){
            clearInterval(shuffle);
            stopSpinSound();
            dingSound();
            addHistory(shuffled);
        }

    },100);
}

function addHistory(resultArray){
    const p=document.createElement("div");
    const time=new Date().toLocaleTimeString();

    const resultText=resultArray
        .map(t=>`${t.name} (${t.thai})`)
        .join(" | ");

    p.innerHTML=`${time} ➜ ${resultText}`;
    historyBox.appendChild(p);
}
</script>

</body>
</html>
