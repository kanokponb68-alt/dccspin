<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SPORT DAY 2026 - SLOT MODE</title>

<style>
body{
    margin:0;
    font-family:'Arial Black',sans-serif;
    background:radial-gradient(circle,#1a1a2e,#000);
    color:white;
    text-align:center;
}

.title{
    font-size:6vw;
    margin-top:20px;
}

/* ===== SLOT LAYOUT ===== */
.slot-container{
    display:flex;
    justify-content:center;
    gap:3vw;
    margin:30px 0;
    flex-wrap:wrap;
}

.slot{
    position:relative;
    display:flex;
    flex-direction:column;
    justify-content:space-between;
    align-items:center;
    height:420px;
    width:18vw;
    min-width:120px;
    padding:30px 10px;
    background:black;
    border-radius:25px;
    overflow:hidden;
    font-weight:bold;
}

/* ไฟวิ่งรอบกรอบ */
.slot::before{
    content:"";
    position:absolute;
    inset:-3px;
    border-radius:30px;
    padding:3px;
    background:linear-gradient(
        45deg,
        red,orange,yellow,green,cyan,blue,magenta,red
    );
    background-size:400%;
    animation:borderMove 6s linear infinite;
    -webkit-mask:
        linear-gradient(#000 0 0) content-box,
        linear-gradient(#000 0 0);
    -webkit-mask-composite: xor;
    mask-composite: exclude;
}

@keyframes borderMove{
    0%{background-position:0% 50%;}
    100%{background-position:400% 50%;}
}

/* READY ก่อนสุ่ม */
.placeholder{
    font-size:4vw;
    color:#555;
    letter-spacing:4px;
    animation:blink 1.2s infinite;
}

@keyframes blink{
    0%{opacity:.3;}
    50%{opacity:1;}
    100%{opacity:.3;}
}

.team-name{
    font-size:9vw;
    min-height:150px;
    display:flex;
    align-items:center;
    justify-content:center;
}

.assistant{
    font-size:3vw;
    min-height:100px;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
}

.pop{
    animation:popUp .6s ease forwards;
}

@keyframes popUp{
    0%{transform:translateY(40px) scale(.8);opacity:0;}
    100%{transform:translateY(0) scale(1);opacity:1;}
}

button{
    font-size:5vw;
    padding:15px 30px;
    border:none;
    border-radius:50px;
    background:linear-gradient(45deg,#ff0080,#ffcc00);
    color:white;
    font-weight:bold;
    cursor:pointer;
    margin:10px;
}

.history{
    margin:20px auto;
    padding:15px;
    font-size:4vw;
    max-width:90%;
    max-height:220px;
    overflow-y:auto;
    background:rgba(255,255,255,0.1);
    border-radius:15px;
}
.history strong{
    display:block;
    margin-bottom:10px;
}
/* =========================
   MOBILE RESPONSIVE FIX
========================= */

@media (max-width: 768px){

    .title{
        font-size:8vw;
        margin-top:15px;
    }

    .slot-container{
        display:grid;
        grid-template-columns:1fr 1fr;
        gap:4vw;
        padding:0 4vw;
    }

    .slot{
        width:100%;
        height:38vh;
        padding:20px 10px;
        border-radius:20px;
    }

    .team-name{
        font-size:14vw;
        min-height:auto;
    }

    .assistant{
        font-size:4.5vw;
        min-height:auto;
    }

    button{
        font-size:6vw;
        width:85%;
        max-width:400px;
        margin-top:20px;
    }

    .history{
        font-size:3.8vw;
        max-height:150px;
    }

}
</style>
</head>

<body>

<h1 class="title">🏆 SPORT DAY 2026 🏆</h1>

<div class="slot-container">
    <div class="slot" id="slot1"></div>
    <div class="slot" id="slot2"></div>
    <div class="slot" id="slot3"></div>
    <div class="slot" id="slot4"></div>
</div>

<button onclick="randomAll()">🎤 สุ่ม 4 ทีม</button>

<div class="history" id="history">
<strong>📜 ประวัติการสุ่ม</strong>
</div>

<script>
const teams=[
    {name:"A1"},
    {name:"A2"},
    {name:"A3"},
    {name:"A4"}
];

const colors=["gold","limegreen","hotpink","orange"];

const assistants=[
    {name:"ผู้ช่วยสีส้ม",color:"orange"},
    {name:"ผู้ช่วยสีเขียว",color:"limegreen"},
    {name:"ผู้ช่วยสีชมพู",color:"hotpink"},
    {name:"ผู้ช่วยสีทอง",color:"gold"}
];

const slots=[
    document.getElementById("slot1"),
    document.getElementById("slot2"),
    document.getElementById("slot3"),
    document.getElementById("slot4")
];

const historyBox=document.getElementById("history");

let spinning=false;
let audioCtx, oscillator, gainNode;

/* READY ตอนโหลด */
slots.forEach(slot=>{
    slot.innerHTML=`<div class="placeholder">READY</div>`;
});

function shuffleArray(array){
    return array.sort(()=>Math.random()-0.5);
}

/* ผู้ช่วยห้ามสีตรงกับทีม */
function assignAssistants(teamResults){
    let valid=false;
    let shuffledAssistants;

    while(!valid){
        valid=true;
        shuffledAssistants=shuffleArray([...assistants]);

        for(let i=0;i<teamResults.length;i++){
            if(shuffledAssistants[i].color===teamResults[i].color){
                valid=false;
                break;
            }
        }
    }
    return shuffledAssistants;
}

/* ===== เสียงลุ้น ===== */
function startSpinSound(){
    audioCtx=new (window.AudioContext||window.webkitAudioContext)();
    oscillator=audioCtx.createOscillator();
    gainNode=audioCtx.createGain();

    oscillator.type="sawtooth";
    oscillator.frequency.setValueAtTime(200,audioCtx.currentTime);

    gainNode.gain.setValueAtTime(0.2,audioCtx.currentTime);

    oscillator.connect(gainNode);
    gainNode.connect(audioCtx.destination);

    oscillator.start();
}

function stopSpinSound(){
    if(oscillator){
        oscillator.frequency.exponentialRampToValueAtTime(80,audioCtx.currentTime+0.3);
        gainNode.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+0.3);
        setTimeout(()=>{
            oscillator.stop();
            audioCtx.close();
        },300);
    }
}

/* ===== RANDOM SLOT ===== */
function randomAll(){

    if(spinning) return;
    spinning=true;

    let start=Date.now();
    let duration=5000;
    let speed=80;

    let currentResults=[];

    startSpinSound();

    function spinLoop(){

        let elapsed=Date.now()-start;

        let shuffledTeams=shuffleArray([...teams]);
        let shuffledColors=shuffleArray([...colors]);

        currentResults=shuffledTeams.map((team,i)=>({
            name:team.name,
            color:shuffledColors[i]
        }));

        slots.forEach((slot,i)=>{
            slot.innerHTML=`
                <div class="team-name">${currentResults[i].name}</div>
                <div class="assistant">🎲 กำลังสุ่ม...</div>
            `;
            slot.querySelector(".team-name").style.color=currentResults[i].color;
        });

        /* เสียงไต่สูงขึ้น */
        if(oscillator){
            let progress=elapsed/duration;
            let freq=200+(progress*600);
            oscillator.frequency.setValueAtTime(freq,audioCtx.currentTime);
        }

        /* ชะลอช่วงท้าย */
        if(elapsed>3000){
            speed+=6;
        }

        if(elapsed<duration){
            setTimeout(spinLoop,speed);
        }else{

            stopSpinSound();

            const assignedAssistants=assignAssistants(currentResults);

            /* หยุดพร้อมกันทั้ง 4 ช่อง */
            slots.forEach((slot,i)=>{
                slot.innerHTML=`
                    <div class="team-name pop">${currentResults[i].name}</div>
                    <div class="assistant pop">
                        🤝 ${assignedAssistants[i].name}
                    </div>
                `;
                slot.querySelector(".team-name").style.color=currentResults[i].color;
                slot.querySelector(".assistant").style.color=assignedAssistants[i].color;
            });

            addHistory(currentResults,assignedAssistants);
            spinning=false;
        }
    }

    spinLoop();
}

function addHistory(teamRes,assistRes){
    const p=document.createElement("div");
    const time=new Date().toLocaleTimeString();
    let text="";
    for(let i=0;i<teamRes.length;i++){
        text+=`${teamRes[i].name} (${teamRes[i].color}) ← ${assistRes[i].name}`;
        if(i<teamRes.length-1) text+=" | ";
    }
    p.innerHTML=`${time} ➜ ${text}`;
    historyBox.appendChild(p);
}
</script>
</body>
</html>
